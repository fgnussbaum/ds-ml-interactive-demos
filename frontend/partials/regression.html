<section id="demo-regression" class="demo-section">
  <h2>Linear Regression</h2>
  <p class="instructions">Right-click to add points &nbsp;·&nbsp; Left-click and drag to move points</p>
  <canvas id="regression-canvas" width="800" height="480"></canvas>
  <div class="controls">
    <label><input type="checkbox" id="show-ls" checked> <span class="ls-label">Least Squares</span></label>
    <label><input type="checkbox" id="show-rr"> <span class="rr-label">Robust / L1</span></label>
    <label><input type="checkbox" id="show-devs"> Show residuals</label>
    <button id="clear-btn">Clear</button>
  </div>
</section>
